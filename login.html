<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Adono</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .bg-wave {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
         .bg-wave svg {
            position: absolute;
            top: -20%;
            left: -30%;
            width: 200%;
            height: 150%;
            transform: rotate(-15deg);
            opacity: 0.1;
        }
    </style>
</head>
<body class="bg-red-50 text-gray-800">

    <div class="relative min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <!-- Wavy Background -->
        <div class="bg-wave">
             <svg viewBox="0 0 1440 810" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M-213.017 458.636C-2.81267 262.003 40.5283 499.336 244.593 502.5C448.658 505.664 532.427 289.049 713.834 294.5C895.241 299.951 988.358 488.08 1169.77 502.5C1351.17 516.92 1447.28 294.5 1618.17 323.882" stroke="#FF6347" stroke-width="150" stroke-linecap="round"/>
            </svg>
        </div>

        <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-lg z-10">
            <div>
                <div class="flex items-center justify-center">
                    <!-- Placeholder SVG Logo -->
                    <svg class="h-10 w-10 mr-3 text-red-500" fill="currentColor" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 10 H75 L90 25 V90 H15 Z" fill="none" stroke="currentColor" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
                        <path d="M75 10 V25 H90" fill="none" stroke="currentColor" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
                        <text x="53" y="72" text-anchor="middle" font-family="Inter, sans-serif" font-size="55" font-weight="800">A</text>
                    </svg>
                    <span class="text-3xl font-bold text-gray-800">Adono</span>
                </div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
                    Sign in to your account
                </h2>
            </div>
            <form class="mt-8 space-y-6" onsubmit="event.preventDefault(); window.location.href='home.html';">
                <input type="hidden" name="remember" value="true">
                <div class="rounded-md shadow-sm -space-y-px">
                    <div>
                        <label for="email-address" class="sr-only">Email address</label>
                        <input id="email-address" name="email" type="email" autocomplete="email" required class="appearance-none rounded-none relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-t-md focus:outline-none focus:ring-red-500 focus:border-red-500 focus:z-10 sm:text-sm" placeholder="Email address">
                    </div>
                    <div>
                        <label for="password" class="sr-only">Password</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required class="appearance-none rounded-none relative block w-full px-3 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-b-md focus:outline-none focus:ring-red-500 focus:border-red-500 focus:z-10 sm:text-sm" placeholder="Password">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-red-600 focus:ring-red-500 border-gray-300 rounded">
                        <label for="remember-me" class="ml-2 block text-sm text-gray-900">
                            Remember me
                        </label>
                    </div>

                    <div class="text-sm">
                        <a href="#" class="font-medium text-red-600 hover:text-red-500">
                            Forgot your password?
                        </a>
                    </div>
                </div>

                <div>
                    <button type="submit" class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-red-500 hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-all transform hover:scale-105">
                        Sign in
                    </button>
                </div>
            </form>
             <p class="mt-4 text-center text-sm text-gray-600">
                Don't have an account?
                <a href="#" class="font-medium text-red-600 hover:text-red-500">
                    Sign up
                </a>
            </p>
        </div>
    </div>

</body>
</html>
